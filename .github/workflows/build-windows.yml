name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --clean --name "Kanjo Scrap Yard Heroes" --icon assets/icon.ico --add-data "assets;assets" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Kanjo-Scrap-Yard-Heroes-Windows
          path: dist/Kanjo Scrap Yard Heroes.exe
